name: Preview Deployment

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write        # Required for OIDC token exchange with Vercel
  pull-requests: write   # Required to post preview URL comment on the PR

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-preview:
    name: Deploy — Preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # OIDC: sub claim for a PR will be:
      # repo:giancarlorecinos/404Lab-Agency:pull_request
      - name: Pull Vercel environment (OIDC)
        working-directory: ./web
        run: |
          vercel pull --yes \
            --environment=preview \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build preview
        working-directory: ./web
        run: |
          vercel build \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        id: deploy
        working-directory: ./web
        run: |
          PREVIEW_URL=$(vercel deploy --prebuilt \
            --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Preview Deployment\n\n**404lab-agency** preview is ready:\n\n🔗 ${{ steps.deploy.outputs.preview_url }}`
            })
