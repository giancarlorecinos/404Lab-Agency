name: Deploy to Production

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy-production:
    name: Deploy — Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Validate token and resolve org + project IDs via the Vercel REST API.
      # If this step fails, the VERCEL_TOKEN secret is invalid or expired.
      - name: Validate Vercel token
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            https://api.vercel.com/v2/user)
          echo "Vercel API status: $HTTP"
          [ "$HTTP" = "200" ] || { echo "::error::VERCEL_TOKEN is invalid (HTTP $HTTP)"; exit 1; }

      # Write the project link file from secrets.
      # VERCEL_ORG_ID  → Project Settings → General → "Team ID" (team_xxx) or your user ID
      # VERCEL_PROJECT_ID → Project Settings → General → "Project ID" (prj_xxx)
      - name: Link Vercel project
        working-directory: ./web
        run: |
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}' \
            "${{ secrets.VERCEL_ORG_ID }}" \
            "${{ secrets.VERCEL_PROJECT_ID }}" \
            > .vercel/project.json
          echo "project.json written"

      - name: Build project
        working-directory: ./web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        working-directory: ./web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
