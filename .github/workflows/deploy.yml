name: Deploy to Production

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write  # Required for OIDC token exchange with Vercel

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-production:
    name: Deploy — Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # OIDC: Exchange GitHub identity token for a short-lived Vercel token.
      # This eliminates the need for a long-lived VERCEL_TOKEN secret.
      # Requires the Vercel project to have GitHub OIDC trust configured.
      # sub claim format: repo:giancarlorecinos/404Lab-Agency:ref:refs/heads/main
      - name: Pull Vercel environment (OIDC)
        working-directory: ./web
        run: |
          vercel pull --yes \
            --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        working-directory: ./web
        run: |
          vercel build --prod \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        working-directory: ./web
        run: |
          vercel deploy --prebuilt --prod \
            --token=${{ secrets.VERCEL_TOKEN }}
