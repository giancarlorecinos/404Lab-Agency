name: Deploy to Production

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-production:
    name: Deploy — Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Link Vercel project
        run: |
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}' \
            "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" \
            > .vercel/project.json

      - name: Deploy to production
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed: $DEPLOY_URL"

      # Ensure the custom domain always points to the latest deployment.
      # This is a no-op if the domain is already aliased; --yes skips confirmation.
      - name: Alias custom domain
        run: |
          vercel alias set "${{ steps.deploy.outputs.url }}" 404lab.agency \
            --token=${{ secrets.VERCEL_TOKEN }} --yes || true
          vercel alias set "${{ steps.deploy.outputs.url }}" www.404lab.agency \
            --token=${{ secrets.VERCEL_TOKEN }} --yes || true
          echo "Domain alias complete"
