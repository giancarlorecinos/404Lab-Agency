name: Deploy to Production

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-production:
    name: Deploy — Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Link Vercel project
        run: |
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}' \
            "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" \
            > .vercel/project.json

      # Register custom domains in Vercel project settings (idempotent).
      # Once registered, vercel deploy --prod will alias them automatically.
      - name: Register custom domains
        run: |
          for DOMAIN in "404lab.agency" "www.404lab.agency"; do
            RESULT=$(curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"$DOMAIN\"}" \
              "https://api.vercel.com/v9/projects/prj_BsZu7fSB647OXSOsSPPBuWYasrcp/domains")
            echo "$DOMAIN → $(echo $RESULT | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('error',{}).get('message','registered') if 'error' in d else 'ok')")"
          done

      - name: Deploy to production
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
